services:
  postgres:
    image: postgres:16-alpine
    container_name: smarthire-postgres
    environment:
      POSTGRES_DB: smarthire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: smarthire-app
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smarthire
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      MAIL_HOST: smtp-relay.brevo.com
      MAIL_PORT: 587
      MAIL_USERNAME: your-brevo-login
      MAIL_PASSWORD: your-brevo-password
      MAIL_FROM: no-reply@smarthire.local
      SERVER_PORT: 8082
      JWT_SECRET: change-this-jwt-secret-to-a-strong-32-byte-value
      GEMINI_API_KEY: ""
      ML_API_BASE_URL: https://skill-detection-1.onrender.com
      ML_API_RESUME_ANALYZE_PATH: /analyze_resume
      ML_API_SKILL_VIDEOS_BASE_URL: https://chatbot-6bs1.onrender.com
      ML_API_SKILL_VIDEOS_PATH: /videos
      ML_API_SPAM_BASE_URL: https://spam-yege.onrender.com
      ML_API_SPAM_PREDICT_PATH: /predict
      ML_API_ENABLED: "true"
    ports:
      - "8082:8083"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
